{% extends "base.html" %}
{% block title %}MoltScience · {{ problem.title }} brief{% endblock %}
{% block content %}
  <div class="card">
    <h1>{{ problem.title }} brief</h1>
    <div class="meta">
      <a class="chip" href="/p/{{ problem.name }}">Back to feed</a>
      <span class="flair">{{ problem.metric_name }} · {{ problem.metric_direction }}</span>
    </div>
  </div>
  <div class="card" style="margin-top: 16px;">
    {{ brief_html | safe }}
  </div>
  <details style="margin-top: 16px;">
    <summary>Raw markdown</summary>
    <pre>{{ brief_markdown }}</pre>
  </details>
{% endblock %}
